<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c14">
<title>เข้าสู่ระบบ — บันทึกรายรับ-รายจ่าย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Sarabun',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
body{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0c0c14;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(180,155,80,0.08)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(180,155,80,0.05)0%,transparent 50%);pointer-events:none;}
.line{position:fixed;background:linear-gradient(180deg,transparent,rgba(180,155,80,0.15),transparent);pointer-events:none;}
.line-1{width:1px;height:100%;left:15%;top:0;animation:lp 8s ease-in-out infinite;}
.line-2{width:1px;height:100%;right:20%;top:0;animation:lp 8s ease-in-out infinite 3s;}
.line-3{height:1px;width:100%;top:25%;left:0;animation:lp 8s ease-in-out infinite 5s;}
@keyframes lp{0%,100%{opacity:0.15;}50%{opacity:0.4;}}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:1.2rem;}
.card{border:0.5px solid rgba(180,155,80,0.2);border-radius:16px;background:rgba(18,18,28,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:2.5rem 2rem;animation:up 0.7s cubic-bezier(0.16,1,0.3,1);}
@keyframes up{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.corner{position:absolute;width:50px;height:50px;border:0.5px solid rgba(180,155,80,0.15);pointer-events:none;}
.c-tl{top:12px;left:12px;border-right:none;border-bottom:none;border-radius:8px 0 0 0;}
.c-br{bottom:12px;right:12px;border-left:none;border-top:none;border-radius:0 0 8px 0;}
.logo{text-align:center;margin-bottom:2rem;}
.logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#b49b50,#d4c070);display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:#0c0c14;font-weight:700;margin-bottom:12px;box-shadow:0 0 30px rgba(180,155,80,0.2);}
.logo-t{font-size:20px;font-weight:600;color:#e8e4d8;letter-spacing:0.5px;}
.logo-s{font-size:12px;color:rgba(180,175,160,0.5);margin-top:4px;letter-spacing:1px;text-transform:uppercase;}
.tabs{display:flex;gap:2px;margin-bottom:1.8rem;background:rgba(255,255,255,0.03);border-radius:10px;padding:3px;border:0.5px solid rgba(180,155,80,0.1);}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:rgba(180,175,160,0.45);transition:all 0.3s;font-family:inherit;}
.tab.active{background:rgba(180,155,80,0.12);color:#d4c070;border:0.5px solid rgba(180,155,80,0.2);}
.form{display:flex;flex-direction:column;gap:16px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;font-weight:500;color:rgba(180,175,160,0.55);letter-spacing:0.5px;text-transform:uppercase;}
.field input{padding:12px 14px;border:0.5px solid rgba(180,155,80,0.15);border-radius:10px;font-size:15px;color:#e8e4d8;background:rgba(255,255,255,0.03);outline:none;transition:border-color 0.3s,box-shadow 0.3s;font-family:inherit;}
.field input:focus{border-color:rgba(180,155,80,0.5);box-shadow:0 0 0 3px rgba(180,155,80,0.08);}
.field input::placeholder{color:rgba(180,175,160,0.22);}
.pw-w{position:relative;}.pw-w input{width:100%;padding-right:40px;}
.pw-t{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:rgba(180,175,160,0.3);padding:4px;transition:color 0.2s;}
.pw-t:hover{color:rgba(180,175,160,0.6);}
.extras{display:flex;align-items:center;justify-content:space-between;}
.rem{display:flex;align-items:center;gap:7px;font-size:12px;color:rgba(180,175,160,0.45);cursor:pointer;}
.rem input{width:14px;height:14px;accent-color:#b49b50;}
.fgt{font-size:12px;color:#b49b50;text-decoration:none;cursor:pointer;opacity:0.7;transition:opacity 0.2s;}
.fgt:hover{opacity:1;}
.btn{margin-top:4px;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#b49b50,#d4c070);color:#0c0c14;font-size:15px;font-weight:600;cursor:pointer;transition:transform 0.15s,box-shadow 0.2s;font-family:inherit;letter-spacing:0.5px;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left 0.5s;}
.btn:hover::before{left:100%;}
.btn:hover{box-shadow:0 0 25px rgba(180,155,80,0.3);transform:translateY(-1px);}
.btn:active{transform:scale(0.98);}
.btn.loading{pointer-events:none;opacity:0.7;}
.btn .spinner{display:none;width:18px;height:18px;border:2px solid rgba(12,12,20,0.3);border-top-color:#0c0c14;border-radius:50%;animation:spin 0.7s linear infinite;position:absolute;right:16px;top:50%;margin-top:-9px;}
.btn.loading .spinner{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
.divider{display:flex;align-items:center;gap:14px;margin:16px 0 12px;}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:rgba(180,155,80,0.1);}
.divider span{font-size:11px;color:rgba(180,175,160,0.3);letter-spacing:1px;text-transform:uppercase;}
.socials{display:flex;gap:10px;}
.soc{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;border-radius:10px;border:0.5px solid rgba(180,155,80,0.1);background:rgba(255,255,255,0.02);cursor:pointer;font-size:13px;color:rgba(180,175,160,0.45);transition:all 0.2s;font-family:inherit;}
.soc:hover{border-color:rgba(180,155,80,0.3);color:#d4c070;background:rgba(180,155,80,0.05);}
.soc svg{width:16px;height:16px;fill:currentColor;flex-shrink:0;}
.footer{text-align:center;margin-top:1.2rem;font-size:12px;color:rgba(180,175,160,0.3);}
.footer a{color:#b49b50;cursor:pointer;text-decoration:none;}
.footer a:hover{text-decoration:underline;}
.msg{padding:10px 14px;border-radius:8px;font-size:12px;display:none;margin-bottom:12px;animation:mi 0.3s ease;}
.msg.error{background:rgba(226,75,74,0.1);color:#f09595;border:0.5px solid rgba(226,75,74,0.2);}
.msg.success{background:rgba(29,158,117,0.1);color:#5dcaa5;border:0.5px solid rgba(29,158,117,0.2);}
.msg.show{display:block;}
@keyframes mi{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.pw-str{display:flex;gap:3px;margin-top:4px;}
.pw-bar{flex:1;height:2px;border-radius:99px;background:rgba(255,255,255,0.05);transition:background 0.3s;}
.pw-bar.w{background:#e24b4a;}.pw-bar.m{background:#ef9f27;}.pw-bar.s{background:#5dcaa5;}
.pw-txt{font-size:10px;margin-top:3px;color:rgba(180,175,160,0.4);}
.terms{font-size:10px;color:rgba(180,175,160,0.25);text-align:center;line-height:1.5;margin-top:6px;}
.terms a{color:rgba(180,155,80,0.5);text-decoration:none;}
.forgot-head{text-align:center;margin-bottom:12px;}.forgot-icon{font-size:32px;margin-bottom:8px;}.forgot-t{font-size:15px;font-weight:500;color:#e8e4d8;}.forgot-s{font-size:12px;color:rgba(180,175,160,0.45);margin-top:4px;}
.back-link{text-align:center;margin-top:14px;}.back-link a{font-size:12px;color:#b49b50;cursor:pointer;text-decoration:none;opacity:0.7;}
@media(max-width:480px){.wrap{padding:0.7rem;}.card{padding:2rem 1.4rem;border-radius:14px;}.logo-icon{width:50px;height:50px;font-size:24px;}.logo-t{font-size:18px;}.socials{flex-direction:column;}.corner{width:35px;height:35px;}}
</style>
</head>
<body>
<div class="line line-1"></div>
<div class="line line-2"></div>
<div class="line line-3"></div>

<div class="wrap">
  <div class="card" style="position:relative;">
    <div class="corner c-tl"></div>
    <div class="corner c-br"></div>
    <div class="logo">
      <div class="logo-icon">฿</div>
      <div class="logo-t">บันทึกรายรับ-รายจ่าย</div>
      <div class="logo-s">Personal Finance Tracker</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
      <button class="tab" onclick="switchTab('register')">สมัครใหม่</button>
    </div>
    <div class="msg" id="msg"></div>

    <!-- Login -->
    <div id="f-login">
      <div class="form">
        <div class="field"><label>อีเมล</label><input type="email" id="le" placeholder="you@example.com" autocomplete="email" inputmode="email"></div>
        <div class="field"><label>รหัสผ่าน</label><div class="pw-w"><input type="password" id="lp" placeholder="รหัสผ่าน" autocomplete="current-password"><button class="pw-t" onclick="tpw('lp',this)" type="button">&#9737;</button></div></div>
        <div class="extras"><label class="rem"><input type="checkbox" checked> จดจำฉันไว้</label><a class="fgt" onclick="switchTab('forgot')">ลืมรหัสผ่าน?</a></div>
        <button class="btn" id="bl" onclick="doLogin()">เข้าสู่ระบบ<div class="spinner"></div></button>
      </div>
    </div>

    <!-- Register -->
    <div id="f-register" style="display:none;">
      <div class="form">
        <div class="field"><label>ชื่อที่แสดง</label><input type="text" id="rn" placeholder="ชื่อของคุณ" autocomplete="name"></div>
        <div class="field"><label>อีเมล</label><input type="email" id="re" placeholder="you@example.com" autocomplete="email" inputmode="email"></div>
        <div class="field"><label>รหัสผ่าน</label><div class="pw-w"><input type="password" id="rp" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password" oninput="ckStr(this.value)"><button class="pw-t" onclick="tpw('rp',this)" type="button">&#9737;</button></div><div class="pw-str"><div class="pw-bar" id="b1"></div><div class="pw-bar" id="b2"></div><div class="pw-bar" id="b3"></div><div class="pw-bar" id="b4"></div></div><div class="pw-txt" id="ptxt"></div></div>
        <div class="field"><label>ยืนยันรหัสผ่าน</label><div class="pw-w"><input type="password" id="rp2" placeholder="พิมพ์อีกครั้ง" autocomplete="new-password"><button class="pw-t" onclick="tpw('rp2',this)" type="button">&#9737;</button></div></div>
        <button class="btn" id="br" onclick="doRegister()">สมัครสมาชิก<div class="spinner"></div></button>
        <div class="terms">การสมัครแสดงว่าคุณยอมรับ <a href="#">ข้อตกลงการใช้งาน</a> และ <a href="#">นโยบายความเป็นส่วนตัว</a></div>
      </div>
    </div>

    <!-- Forgot -->
    <div id="f-forgot" style="display:none;">
      <div class="form">
        <div class="forgot-head"><div class="forgot-icon">✉</div><div class="forgot-t">รีเซ็ตรหัสผ่าน</div><div class="forgot-s">กรอกอีเมลที่ใช้สมัคร เราจะส่งลิงก์ให้</div></div>
        <div class="field"><label>อีเมล</label><input type="email" id="fe" placeholder="you@example.com" inputmode="email"></div>
        <button class="btn" id="bf" onclick="doForgot()">ส่งลิงก์รีเซ็ต<div class="spinner"></div></button>
        <div class="back-link"><a onclick="switchTab('login')">← กลับหน้าเข้าสู่ระบบ</a></div>
      </div>
    </div>

    <!-- Social -->
    <div id="soc-section">
      <div class="divider"><span>or continue with</span></div>
      <div class="socials">
        <button class="soc" onclick="socialLogin('google')"><svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Google</button>
        <button class="soc" onclick="socialLogin('facebook')"><svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>Facebook</button>
      </div>
    </div>
    <div class="footer" id="footer">ยังไม่มีบัญชี? <a onclick="switchTab('register')">สมัครเลย</a></div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL='https://jljoootcqddcixmwmtxl.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impsam9vb3RjcWRkY2l4bXdtdHhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjYwNzMsImV4cCI6MjA5MjIwMjA3M30.4NdR9pFjE_ILaAWoWlJOJFNae1pnP1CWkmtot6ooDZw';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

(async()=>{const{data:{session}}=await sb.auth.getSession();if(session)window.location.href='budget_tracker_thai.html';})();

let ct='login';
function switchTab(t){ct=t;hideMsg();
  document.getElementById('f-login').style.display=t==='login'?'':'none';
  document.getElementById('f-register').style.display=t==='register'?'':'none';
  document.getElementById('f-forgot').style.display=t==='forgot'?'':'none';
  document.getElementById('soc-section').style.display=t==='forgot'?'none':'';
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(t==='login'&&i===0)||((t==='register')&&i===1)));
  const f=document.getElementById('footer');
  if(t==='login')f.innerHTML='ยังไม่มีบัญชี? <a onclick="switchTab(\'register\')">สมัครเลย</a>';
  else if(t==='register')f.innerHTML='มีบัญชีแล้ว? <a onclick="switchTab(\'login\')">เข้าสู่ระบบ</a>';
  else f.innerHTML='<a onclick="switchTab(\'login\')">← กลับหน้าเข้าสู่ระบบ</a>';
}
function tpw(id,btn){const i=document.getElementById(id);if(i.type==='password'){i.type='text';btn.innerHTML='&#9673;';}else{i.type='password';btn.innerHTML='&#9737;';}}
function showMsg(t,ty){const e=document.getElementById('msg');e.textContent=t;e.className='msg '+ty+' show';}
function hideMsg(){document.getElementById('msg').className='msg';}
function ckStr(pw){const bars=[document.getElementById('b1'),document.getElementById('b2'),document.getElementById('b3'),document.getElementById('b4')];const txt=document.getElementById('ptxt');bars.forEach(b=>b.className='pw-bar');if(!pw.length){txt.textContent='';return;}let s=0;if(pw.length>=6)s++;if(pw.length>=10)s++;if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;s=Math.min(4,s);const lv=[{c:'w',t:'อ่อนมาก'},{c:'w',t:'อ่อน'},{c:'m',t:'ปานกลาง'},{c:'s',t:'แข็งแรง'},{c:'s',t:'แข็งแรงมาก'}][s];for(let i=0;i<s;i++)bars[i].classList.add(lv.c);txt.textContent=lv.t;}
function vEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function setL(id,on){const b=document.getElementById(id);b.classList.toggle('loading',on);b.disabled=on;}
function thErr(msg){if(!msg)return'เกิดข้อผิดพลาด';const m=msg.toLowerCase();if(m.includes('invalid login'))return'อีเมลหรือรหัสผ่านไม่ถูกต้อง';if(m.includes('email not confirmed'))return'กรุณายืนยันอีเมลก่อน (ตรวจสอบกล่องจดหมาย)';if(m.includes('already registered'))return'อีเมลนี้ถูกใช้สมัครแล้ว';if(m.includes('rate limit'))return'คำขอบ่อยเกินไป กรุณารอสักครู่';if(m.includes('password'))return'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';if(m.includes('email'))return'รูปแบบอีเมลไม่ถูกต้อง';return msg;}

async function doLogin(){hideMsg();const email=document.getElementById('le').value.trim(),pw=document.getElementById('lp').value;if(!email||!pw){showMsg('กรุณากรอกอีเมลและรหัสผ่าน','error');return;}if(!vEmail(email)){showMsg('รูปแบบอีเมลไม่ถูกต้อง','error');return;}setL('bl',true);const{data,error}=await sb.auth.signInWithPassword({email,password:pw});setL('bl',false);if(error){showMsg(thErr(error.message),'error');return;}showMsg('เข้าสู่ระบบสำเร็จ! กำลังนำทาง...','success');setTimeout(()=>window.location.href='budget_tracker_thai.html',800);}

async function doRegister(){hideMsg();const name=document.getElementById('rn').value.trim(),email=document.getElementById('re').value.trim(),pw=document.getElementById('rp').value,pw2=document.getElementById('rp2').value;if(!name){showMsg('กรุณากรอกชื่อ','error');return;}if(!email||!vEmail(email)){showMsg('กรุณากรอกอีเมลที่ถูกต้อง','error');return;}if(pw.length<6){showMsg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร','error');return;}if(pw!==pw2){showMsg('รหัสผ่านไม่ตรงกัน','error');return;}setL('br',true);const{data,error}=await sb.auth.signUp({email,password:pw,options:{data:{display_name:name}}});setL('br',false);if(error){showMsg(thErr(error.message),'error');return;}if(data.user){await sb.from('user_settings').upsert({id:data.user.id,display_name:name,font:1,size:3,dark_mode:false,sound:true,savings_goal:0}).select();}if(data.user&&!data.session){showMsg('สมัครสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยันบัญชี','success');}else if(data.session){showMsg('สมัครสำเร็จ! กำลังนำทาง...','success');setTimeout(()=>window.location.href='budget_tracker_thai.html',800);}}

async function doForgot(){hideMsg();const email=document.getElementById('fe').value.trim();if(!email||!vEmail(email)){showMsg('กรุณากรอกอีเมลที่ถูกต้อง','error');return;}setL('bf',true);const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/login.html'});setL('bf',false);if(error){showMsg(thErr(error.message),'error');return;}showMsg('ส่งลิงก์รีเซ็ตไปที่อีเมลแล้ว!','success');}

async function socialLogin(provider){hideMsg();const{error}=await sb.auth.signInWithOAuth({provider,options:{redirectTo:window.location.origin+'/budget_tracker_thai.html'}});if(error)showMsg(thErr(error.message),'error');}

document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(ct==='login')doLogin();else if(ct==='register')doRegister();else if(ct==='forgot')doForgot();}});
</script>
</body>
</html>
