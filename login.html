<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf5ec">
<title>เข้าสู่ระบบ — บันทึกรายรับ-รายจ่าย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Sarabun',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
body{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#faf5ec;}
body::before{content:'';position:fixed;inset:-60%;z-index:0;background:radial-gradient(circle at 20% 25%,rgba(255,180,200,0.55)0%,transparent 45%),radial-gradient(circle at 80% 15%,rgba(180,220,255,0.55)0%,transparent 45%),radial-gradient(circle at 70% 80%,rgba(255,230,180,0.5)0%,transparent 45%),radial-gradient(circle at 15% 75%,rgba(200,235,200,0.5)0%,transparent 45%);animation:drift 20s ease-in-out infinite alternate;pointer-events:none;}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg);}50%{transform:translate(30px,-20px) rotate(1deg);}100%{transform:translate(-15px,25px) rotate(-0.5deg);}}
.shape{position:fixed;border-radius:50%;opacity:0.12;z-index:0;pointer-events:none;}
.shape-1{width:300px;height:300px;background:#B67BC2;top:-80px;right:-60px;animation:f1 18s ease-in-out infinite;}
.shape-2{width:200px;height:200px;background:#378ADD;bottom:-40px;left:-50px;animation:f2 22s ease-in-out infinite;}
.shape-3{width:150px;height:150px;background:#1D9E75;top:50%;left:-30px;animation:f1 15s ease-in-out infinite reverse;}
@keyframes f1{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,30px);}}
@keyframes f2{0%,100%{transform:translate(0,0);}50%{transform:translate(-15px,-25px);}}
.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:1.2rem;}
.login-card{background:rgba(255,255,255,0.82);backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);border:0.5px solid rgba(255,255,255,0.7);border-radius:20px;padding:2.2rem 2rem;box-shadow:0 20px 60px rgba(120,100,140,0.12);animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes cardIn{0%{opacity:0;transform:translateY(30px) scale(0.96);}100%{opacity:1;transform:translateY(0) scale(1);}}
.logo{text-align:center;margin-bottom:1.8rem;}
.logo-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#1D9E75,#27AE60);display:inline-flex;align-items:center;justify-content:center;font-size:30px;color:#fff;box-shadow:0 8px 24px rgba(29,158,117,0.3);margin-bottom:12px;}
.logo-title{font-size:22px;font-weight:600;color:#1a1a1a;}
.logo-sub{font-size:13px;color:#8a8a88;margin-top:4px;}
.auth-tabs{display:flex;gap:4px;background:rgba(0,0,0,0.04);border-radius:10px;padding:3px;margin-bottom:1.6rem;}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:15px;font-weight:500;color:#888;transition:all 0.25s;font-family:inherit;}
.auth-tab.active{background:#fff;color:#1a1a1a;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.auth-form{display:flex;flex-direction:column;gap:14px;}
.form-field{display:flex;flex-direction:column;gap:5px;}
.form-field label{font-size:13px;font-weight:500;color:#555;}
.form-field input{padding:12px 14px;border:1px solid rgba(0,0,0,0.1);border-radius:10px;font-size:15px;color:#1a1a1a;background:rgba(255,255,255,0.7);outline:none;transition:border-color 0.2s,box-shadow 0.2s;font-family:inherit;}
.form-field input:focus{border-color:#B67BC2;box-shadow:0 0 0 3px rgba(182,123,194,0.12);}
.form-field input::placeholder{color:#bbb;}
.pw-wrap{position:relative;}.pw-wrap input{width:100%;padding-right:44px;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#999;padding:4px;}
.form-extras{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.remember{display:flex;align-items:center;gap:7px;font-size:13px;color:#777;cursor:pointer;}
.remember input{width:16px;height:16px;accent-color:#B67BC2;cursor:pointer;}
.forgot{font-size:13px;color:#B67BC2;text-decoration:none;font-weight:500;cursor:pointer;}
.auth-btn{margin-top:6px;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#1D9E75,#27AE60);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform 0.15s,box-shadow 0.2s;font-family:inherit;box-shadow:0 4px 16px rgba(29,158,117,0.3);position:relative;overflow:hidden;}
.auth-btn:hover{transform:translateY(-1px);}
.auth-btn:active{transform:scale(0.98);}
.auth-btn.loading{pointer-events:none;opacity:0.7;}
.auth-btn .spinner{display:none;width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;position:absolute;right:18px;top:50%;margin-top:-10px;}
.auth-btn.loading .spinner{display:block;}
@keyframes spin{to{transform:rotate(360deg);}}
.divider{display:flex;align-items:center;gap:14px;margin:18px 0 14px;}.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:rgba(0,0,0,0.1);}.divider span{font-size:12px;color:#aaa;white-space:nowrap;}
.social-btns{display:flex;gap:10px;}
.social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:10px;border:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.6);cursor:pointer;font-size:14px;font-weight:500;color:#555;transition:all 0.15s;font-family:inherit;}
.social-btn:hover{background:rgba(255,255,255,0.9);}
.social-btn:active{transform:scale(0.97);}
.social-icon{font-size:20px;}
.msg{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:10px;display:none;animation:msgIn 0.3s ease;}
.msg.error{background:#FAECE7;color:#993C1D;border:0.5px solid rgba(216,90,48,0.2);}
.msg.success{background:#E1F5EE;color:#085041;border:0.5px solid rgba(29,158,117,0.2);}
.msg.show{display:block;}
@keyframes msgIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.terms{font-size:11px;color:#aaa;text-align:center;margin-top:14px;line-height:1.5;}.terms a{color:#B67BC2;text-decoration:none;}
.login-footer{text-align:center;margin-top:20px;font-size:13px;color:#999;}.login-footer a{color:#1D9E75;font-weight:500;text-decoration:none;cursor:pointer;}
.pw-strength{display:flex;gap:4px;margin-top:4px;}.pw-bar{flex:1;height:3px;border-radius:99px;background:rgba(0,0,0,0.06);transition:background 0.3s;}
.pw-bar.weak{background:#E74C3C;}.pw-bar.mid{background:#F39C12;}.pw-bar.strong{background:#27AE60;}
.pw-text{font-size:11px;margin-top:3px;}
@media(max-width:480px){.login-wrap{padding:0.8rem;}.login-card{padding:1.6rem 1.3rem;border-radius:16px;}.logo-icon{width:56px;height:56px;font-size:26px;}.logo-title{font-size:20px;}.social-btns{flex-direction:column;}.shape-3{display:none;}}
</style>
</head>
<body>
<div class="shape shape-1"></div>
<div class="shape shape-2"></div>
<div class="shape shape-3"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">฿</div>
      <div class="logo-title">บันทึกรายรับ-รายจ่าย</div>
      <div class="logo-sub">เข้าสู่ระบบเพื่อซิงค์ข้อมูลทุกอุปกรณ์</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">เข้าสู่ระบบ</button>
      <button class="auth-tab" onclick="switchTab('register')">สมัครใหม่</button>
    </div>
    <div class="msg" id="msg"></div>

    <div id="form-login">
      <div class="auth-form">
        <div class="form-field"><label>อีเมล</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" inputmode="email"></div>
        <div class="form-field"><label>รหัสผ่าน</label><div class="pw-wrap"><input type="password" id="login-pw" placeholder="รหัสผ่าน" autocomplete="current-password"><button class="pw-toggle" onclick="togglePw('login-pw',this)" type="button">👁</button></div></div>
        <div class="form-extras"><label class="remember"><input type="checkbox" checked> จดจำฉันไว้</label><a class="forgot" onclick="showForgot()">ลืมรหัสผ่าน?</a></div>
        <button class="auth-btn" id="btn-login" onclick="doLogin()">เข้าสู่ระบบ<div class="spinner"></div></button>
      </div>
    </div>

    <div id="form-register" style="display:none;">
      <div class="auth-form">
        <div class="form-field"><label>ชื่อที่แสดง</label><input type="text" id="reg-name" placeholder="ชื่อของคุณ" autocomplete="name"></div>
        <div class="form-field"><label>อีเมล</label><input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" inputmode="email"></div>
        <div class="form-field"><label>รหัสผ่าน</label><div class="pw-wrap"><input type="password" id="reg-pw" placeholder="อย่างน้อย 6 ตัวอักษร" autocomplete="new-password" oninput="checkStrength(this.value)"><button class="pw-toggle" onclick="togglePw('reg-pw',this)" type="button">👁</button></div><div class="pw-strength"><div class="pw-bar" id="pw-b1"></div><div class="pw-bar" id="pw-b2"></div><div class="pw-bar" id="pw-b3"></div><div class="pw-bar" id="pw-b4"></div></div><div class="pw-text" id="pw-text"></div></div>
        <div class="form-field"><label>ยืนยันรหัสผ่าน</label><div class="pw-wrap"><input type="password" id="reg-pw2" placeholder="พิมพ์รหัสผ่านอีกครั้ง" autocomplete="new-password"><button class="pw-toggle" onclick="togglePw('reg-pw2',this)" type="button">👁</button></div></div>
        <button class="auth-btn" id="btn-register" onclick="doRegister()">สมัครสมาชิก<div class="spinner"></div></button>
        <div class="terms">การสมัครแสดงว่าคุณยอมรับ <a href="#">ข้อตกลงการใช้งาน</a> และ <a href="#">นโยบายความเป็นส่วนตัว</a></div>
      </div>
    </div>

    <div id="form-forgot" style="display:none;">
      <div class="auth-form">
        <div style="text-align:center;margin-bottom:8px;"><div style="font-size:36px;margin-bottom:8px;">📧</div><div style="font-size:15px;font-weight:500;color:#1a1a1a;">รีเซ็ตรหัสผ่าน</div><div style="font-size:13px;color:#888;margin-top:4px;">กรอกอีเมลที่ใช้สมัคร เราจะส่งลิงก์ให้</div></div>
        <div class="form-field"><label>อีเมล</label><input type="email" id="forgot-email" placeholder="you@example.com" inputmode="email"></div>
        <button class="auth-btn" id="btn-forgot" onclick="doForgot()">ส่งลิงก์รีเซ็ต<div class="spinner"></div></button>
        <div style="text-align:center;margin-top:12px;"><a class="forgot" onclick="switchTab('login')">← กลับหน้าเข้าสู่ระบบ</a></div>
      </div>
    </div>

    <div id="social-section">
      <div class="divider"><span>หรือเข้าสู่ระบบด้วย</span></div>
      <div class="social-btns">
        <button class="social-btn" onclick="socialLogin('google')"><span class="social-icon">🔵</span> Google</button>
        <button class="social-btn" onclick="socialLogin('facebook')"><span class="social-icon">📘</span> Facebook</button>
      </div>
    </div>
  </div>
  <div class="login-footer" id="login-footer">ยังไม่มีบัญชี? <a onclick="switchTab('register')">สมัครเลย</a></div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ═══ เชื่อมต่อ Supabase (Legacy anon key) ═══
const SUPABASE_URL = 'https://jljoootcqddcixmwmtxl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impsam9vb3RjcWRkY2l4bXdtdHhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjYwNzMsImV4cCI6MjA5MjIwMjA3M30.4NdR9pFjE_ILaAWoWlJOJFNae1pnP1CWkmtot6ooDZw';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ถ้า login อยู่แล้ว → ไปหน้าหลัก
(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session) window.location.href='budget_tracker_thai.html';
})();

let currentTab='login';
function switchTab(tab){currentTab=tab;hideMsg();document.getElementById('form-login').style.display=tab==='login'?'':'none';document.getElementById('form-register').style.display=tab==='register'?'':'none';document.getElementById('form-forgot').style.display=tab==='forgot'?'':'none';document.getElementById('social-section').style.display=tab==='forgot'?'none':'';document.querySelectorAll('.auth-tab').forEach((t,i)=>{t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1));});const f=document.getElementById('login-footer');if(tab==='login')f.innerHTML='ยังไม่มีบัญชี? <a onclick="switchTab(\'register\')">สมัครเลย</a>';else if(tab==='register')f.innerHTML='มีบัญชีแล้ว? <a onclick="switchTab(\'login\')">เข้าสู่ระบบ</a>';else f.innerHTML='<a onclick="switchTab(\'login\')">← กลับหน้าเข้าสู่ระบบ</a>';}
function showForgot(){switchTab('forgot');}
function togglePw(id,btn){const i=document.getElementById(id);if(i.type==='password'){i.type='text';btn.textContent='🔒';}else{i.type='password';btn.textContent='👁';}}
function showMsg(t,type){const e=document.getElementById('msg');e.textContent=t;e.className='msg '+type+' show';}
function hideMsg(){document.getElementById('msg').className='msg';}
function checkStrength(pw){const bars=[document.getElementById('pw-b1'),document.getElementById('pw-b2'),document.getElementById('pw-b3'),document.getElementById('pw-b4')];const txt=document.getElementById('pw-text');bars.forEach(b=>b.className='pw-bar');if(!pw.length){txt.textContent='';return;}let s=0;if(pw.length>=6)s++;if(pw.length>=10)s++;if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;s=Math.min(4,s);const lv=[{c:'weak',t:'อ่อนมาก',cl:'#E74C3C'},{c:'weak',t:'อ่อน',cl:'#E74C3C'},{c:'mid',t:'ปานกลาง',cl:'#F39C12'},{c:'strong',t:'แข็งแรง',cl:'#27AE60'},{c:'strong',t:'แข็งแรงมาก',cl:'#1D9E75'}][s];for(let i=0;i<s;i++)bars[i].classList.add(lv.c);txt.textContent=lv.t;txt.style.color=lv.cl;}
function validateEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function setLoading(id,on){const b=document.getElementById(id);b.classList.toggle('loading',on);b.disabled=on;}
function thaiError(msg){if(!msg)return'เกิดข้อผิดพลาด';const m=msg.toLowerCase();if(m.includes('invalid login'))return'อีเมลหรือรหัสผ่านไม่ถูกต้อง';if(m.includes('email not confirmed'))return'กรุณายืนยันอีเมลก่อน (ตรวจสอบกล่องจดหมาย)';if(m.includes('already registered'))return'อีเมลนี้ถูกใช้สมัครแล้ว';if(m.includes('rate limit'))return'คำขอบ่อยเกินไป กรุณารอสักครู่';if(m.includes('password'))return'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร';if(m.includes('email'))return'รูปแบบอีเมลไม่ถูกต้อง';return msg;}

// ─── LOGIN ───
async function doLogin(){
  hideMsg();
  const email=document.getElementById('login-email').value.trim(),pw=document.getElementById('login-pw').value;
  if(!email||!pw){showMsg('กรุณากรอกอีเมลและรหัสผ่าน','error');return;}
  if(!validateEmail(email)){showMsg('รูปแบบอีเมลไม่ถูกต้อง','error');return;}
  setLoading('btn-login',true);
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
  setLoading('btn-login',false);
  if(error){showMsg(thaiError(error.message),'error');return;}
  showMsg('เข้าสู่ระบบสำเร็จ! กำลังนำทาง...','success');
  setTimeout(()=>window.location.href='budget_tracker_thai.html',800);
}

// ─── REGISTER ───
async function doRegister(){
  hideMsg();
  const name=document.getElementById('reg-name').value.trim(),email=document.getElementById('reg-email').value.trim(),pw=document.getElementById('reg-pw').value,pw2=document.getElementById('reg-pw2').value;
  if(!name){showMsg('กรุณากรอกชื่อ','error');return;}
  if(!email||!validateEmail(email)){showMsg('กรุณากรอกอีเมลที่ถูกต้อง','error');return;}
  if(pw.length<6){showMsg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร','error');return;}
  if(pw!==pw2){showMsg('รหัสผ่านไม่ตรงกัน','error');return;}
  setLoading('btn-register',true);
  const{data,error}=await sb.auth.signUp({email,password:pw,options:{data:{display_name:name}}});
  setLoading('btn-register',false);
  if(error){showMsg(thaiError(error.message),'error');return;}
  // สร้าง settings ให้ user ใหม่
  if(data.user){
    await sb.from('user_settings').upsert({id:data.user.id,display_name:name,font:1,size:3,dark_mode:false,sound:true,savings_goal:0}).select();
  }
  if(data.user&&!data.session){
    showMsg('สมัครสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยันบัญชี','success');
  }else if(data.session){
    showMsg('สมัครสำเร็จ! กำลังนำทาง...','success');
    setTimeout(()=>window.location.href='budget_tracker_thai.html',800);
  }
}

// ─── FORGOT ───
async function doForgot(){
  hideMsg();
  const email=document.getElementById('forgot-email').value.trim();
  if(!email||!validateEmail(email)){showMsg('กรุณากรอกอีเมลที่ถูกต้อง','error');return;}
  setLoading('btn-forgot',true);
  const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/login.html'});
  setLoading('btn-forgot',false);
  if(error){showMsg(thaiError(error.message),'error');return;}
  showMsg('ส่งลิงก์รีเซ็ตไปที่อีเมลแล้ว! ตรวจสอบกล่องจดหมาย','success');
}

// ─── SOCIAL ───
async function socialLogin(provider){
  hideMsg();
  const{error}=await sb.auth.signInWithOAuth({provider,options:{redirectTo:window.location.origin+'/budget_tracker_thai.html'}});
  if(error)showMsg(thaiError(error.message),'error');
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(currentTab==='login')doLogin();else if(currentTab==='register')doRegister();else if(currentTab==='forgot')doForgot();}});
</script>
</body>
</html>
